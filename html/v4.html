<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小學徒大世界——大梁城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5ede0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Noto Serif TC', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
      user-select: none;
    }

    /* 開場 */
    #splash {
      position: fixed; inset: 0;
      background: #c8b08a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; z-index: 100;
    }
    #splash-cover { width: 100%; max-width: 600px; height: auto; border-radius: 12px; }
    #splash-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 18px 60px;
      font-size: 22px; font-family: inherit; cursor: pointer;
      letter-spacing: 3px;
    }
    #splash-btn:active { background: #b87000; transform: scale(0.97); }
    #splash-btn:disabled { background: #a08060; cursor: default; }

    /* 語速 */
    #speed-bar {
      width: 100%; max-width: 600px;
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; padding: 8px 56px 0 20px; flex-shrink: 0;
    }
    .speed-label { font-size: 13px; color: #9a7850; }
    .speed-btn {
      background: #fff8ee; border: 1.5px solid #d4a855;
      border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-family: inherit; color: #7a5820; cursor: pointer;
    }
    .speed-btn.active { background: #d4870a; color: #fff8ee; border-color: #d4870a; }

    /* 靜音 */
    #mute-btn {
      position: fixed; top: 12px; right: 16px;
      background: rgba(255,255,255,0.7); border: 1px solid #d4a855;
      border-radius: 50%; width: 40px; height: 40px;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }

    /* 圖像 */
    #image-area {
      width: 100%; max-width: 600px; height: 300px;
      border-radius: 0 0 12px 12px; overflow: hidden;
      flex-shrink: 0; background: #c8b08a;
    }
    #image-area img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
    #img-caption {
      width: 100%; max-width: 600px;
      text-align: center; font-size: 18px; font-style: italic;
      color: #9a7850; padding: 5px 20px 0; flex-shrink: 0;
    }

    /* 進度條 */
    #progress-wrap { width: 100%; max-width: 600px; padding: 8px 20px 0; flex-shrink: 0; }
    #progress-bg { background: #e0c99a; border-radius: 4px; height: 5px; overflow: hidden; }
    #progress-fill { background: #d4870a; height: 100%; border-radius: 4px; transition: width 0.4s; width: 0%; }

    /* 主內容 */
    #main {
      width: 100%; max-width: 600px; flex: 1;
      display: flex; flex-direction: column;
      padding: 14px 20px 32px; gap: 14px;
      opacity: 1; transition: opacity 0.3s;
    }
    #main.fade { opacity: 0; }

    /* 標題 */
    #node-title { color: #7a5820; font-size: 22px; letter-spacing: 2px; text-align: center; line-height: 1.5; min-height: 1.5em; }

    /* 文字區 */
    #text-area {
      background: #fffaf3; border: 1px solid #e0c99a;
      border-radius: 14px; padding: 20px;
      min-height: 130px; max-height: 320px;
      overflow-y: auto; display: flex; flex-direction: column;
      gap: 10px; cursor: pointer; scroll-behavior: smooth;
    }
    .line {
      color: #3a2a10; font-size: 22px; line-height: 1.9;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s, transform 0.35s; flex-shrink: 0;
    }
    .line.show { opacity: 1; transform: translateY(0); }
    .line.question { color: #a07840; margin-top: 6px; }

    /* 高亮 */
    .hl { display: inline; }
    .hl.on { color: #d4870a; font-weight: bold; }
    .opt-text .hl.on { color: #d4870a; font-weight: bold; }

    /* 點擊提示 */
    #tap-hint {
      display: none; text-align: center; font-size: 28px;
      color: #d4a855; cursor: pointer; animation: bounce 1.2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    /* 開始按鈕 */
    #start-btn {
      display: none; background: #d4870a; color: #fff8ee;
      border: none; border-radius: 50px; padding: 18px 0; width: 100%;
      font-size: 22px; font-family: inherit; cursor: pointer; letter-spacing: 3px;
    }
    #start-btn:active { background: #b87000; transform: scale(0.97); }

    /* 選項 */
    #options-area { display: none; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: #fff8ee; border: 2px solid #d4a855;
      border-radius: 12px; padding: 14px 18px;
      font-size: 22px; font-family: inherit; color: #3a2a10;
      text-align: left; cursor: pointer; line-height: 1.6;
      display: flex; align-items: flex-start;
      transition: background 0.15s, border-color 0.15s;
    }
    .opt-btn:active { background: #fdefc8; border-color: #c8900a; transform: scale(0.98); }
    .opt-btn.selected { background: #fdefc8; border-color: #c8900a; }
    .opt-btn:disabled { cursor: default; }
    .opt-label { width: 28px; flex-shrink: 0; color: #a07840; font-weight: bold; }
    .opt-text { flex: 1; }

    /* 完成畫面 */
    #done { display: none; text-align: center; color: #a07840; font-size: 20px; line-height: 2; padding: 20px; }

    /* ── 學徒筆記 ── */
    #notebook-overlay {
      position: fixed; inset: 0;
      background: rgba(60, 35, 10, 0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    #notebook-overlay.show { display: flex; }

    #notebook {
      width: 100%; max-width: 620px;
      background: #fdf6e8;
      border-radius: 16px;
      border: 2px solid #c8a060;
      box-shadow: 0 8px 32px rgba(80,40,0,0.3);
      overflow: hidden;
      display: flex; flex-direction: column;
      max-height: 90vh;
    }

    #notebook-header {
      background: #8b5e2a; color: #fff8ee;
      text-align: center; padding: 14px 20px;
      font-size: 20px; letter-spacing: 3px; flex-shrink: 0;
    }

    #notebook-pages {
      display: flex; flex: 1; overflow: hidden;
    }

    /* 左頁——故事進展 */
    #notebook-left {
      flex: 1; padding: 20px;
      border-right: 1px dashed #c8a060;
      overflow-y: auto;
      background: #fffdf5;
    }
    .nb-section-title {
      font-size: 15px; color: #8b5e2a; letter-spacing: 2px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid #e0c99a;
    }
    .nb-story-line {
      font-size: 17px; color: #3a2a10; line-height: 1.9;
      margin-bottom: 8px;
    }
    .nb-meta { font-size: 14px; color: #9a7850; margin-top: 12px; line-height: 2; }
    .nb-tag {
      display: inline-block; background: #f0e0c0;
      border-radius: 20px; padding: 2px 10px;
      font-size: 13px; color: #7a5820; margin: 2px;
    }

    /* 右頁——今次學了 */
    #notebook-right {
      flex: 1; padding: 20px;
      overflow-y: auto;
      background: #fffdf5;
    }
    .nb-learn-item {
      margin-bottom: 14px; padding: 10px 12px;
      background: #fff8ee; border-radius: 10px;
      border: 1px solid #e0c99a;
    }
    .nb-learn-type {
      font-size: 12px; color: #a07840; letter-spacing: 1px; margin-bottom: 4px;
    }
    .nb-learn-content { font-size: 17px; color: #3a2a10; line-height: 1.7; }
    .nb-anchor-img {
      width: 100%; border-radius: 10px; margin-top: 12px;
      object-fit: cover; max-height: 120px;
    }

    /* 筆記底部按鈕 */
    #notebook-footer {
      background: #f5ede0; padding: 14px 20px;
      text-align: center; flex-shrink: 0;
      border-top: 1px solid #e0c99a;
    }
    #notebook-continue-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 14px 50px;
      font-size: 20px; font-family: inherit; cursor: pointer;
      letter-spacing: 3px;
    }
    #notebook-continue-btn:active { background: #b87000; transform: scale(0.97); }

    /* 載入過渡提示 */
    #loading-overlay {
      position: fixed; inset: 0;
      background: #c8b08a;
      display: none; align-items: center; justify-content: center;
      z-index: 150; font-size: 22px; color: #fff8ee; letter-spacing: 2px;
    }
    #loading-overlay.show { display: flex; }
  </style>
</head>

// ── 語音 ──────────────────────────────────────
window.speechSynthesis.onvoiceschanged = findVoice;
findVoice();
function findVoice() {
  const vs = window.speechSynthesis.getVoices();
  ttsVoice = vs.find(v => v.lang.toLowerCase().includes('zh-hk') || v.name.toLowerCase().includes('cantonese'))
          || vs.find(v => v.lang.toLowerCase().startsWith('zh'))
          || null;
}

function tts(text, cb) {
  window.speechSynthesis.cancel();
  if (muted || !text) { cb && setTimeout(cb, 0); return; }
  const u = new SpeechSynthesisUtterance(text);
  if (ttsVoice) { u.voice = ttsVoice; u.lang = ttsVoice.lang; } else u.lang = 'zh-HK';
  u.rate = rate;
  let called = false;
  const done = () => { if (!called) { called = true; cb && cb(); } };
  u.onend = done;
  u.onerror = done;
  window.speechSynthesis.speak(u);
}

// ── 高亮 ──────────────────────────────────────
let hlN = 0;
function speakHL(el, text, cb) {
  const key = 'h'+(hlN++);
  const chars = text.split('');
  el.innerHTML = chars.map((c,i)=>`<span class="hl" id="${key}_${i}">${c}</span>`).join('');

  if (muted) { cb && setTimeout(cb, 0); return; }

  const perMs = (1/rate)*220;
  let i = 0, alive = true;
  function step() {
    if (!alive) return;
    if (i > 0) { const p = document.getElementById(`${key}_${i-1}`); if(p) p.classList.remove('on'); }
    if (i >= chars.length) return;
    const c = document.getElementById(`${key}_${i}`); if(c) c.classList.add('on');
    i++;
    setTimeout(step, perMs);
  }
  step();

  tts(text, () => {
    alive = false;
    chars.forEach((_,j) => { const e = document.getElementById(`${key}_${j}`); if(e) e.classList.remove('on'); });
    cb && cb();
  });
}

    imgEl.style.display = 'none';
  }
  captionEl.textContent = NAMES[code] || '';
}

// ── 進度條 ────────────────────────────────────
function setProgress(id) {
  const ms = Object.values(db).filter(s => {
    const parts = s.scene_id.split('.');
    return parts.length === 3 && !s.scene_id.match(/\.[A-Z]$/);
  });
  const idx = ms.findIndex(s => s.scene_id === id);
  progressFill.style.width = ms.length ? `${((idx+1)/ms.length)*100}%` : '0%';
}

// ── 點擊提示 ──────────────────────────────────
function setTap(fn) {
  tapCb = fn;
  clearTimeout(tapTimer);
  tapHint.style.display = 'none';
  tapTimer = setTimeout(() => { tapHint.style.display = 'block'; }, 2000);
}
function clearTap() {
  tapCb = null;
  clearTimeout(tapTimer);
  tapHint.style.display = 'none';
}

textArea.addEventListener('click', fireTap);
tapHint.addEventListener('click', fireTap);
mainEl.addEventListener('click', e => { if (e.target === mainEl) fireTap(); });
function fireTap() { if (tapCb) { const fn = tapCb; clearTap(); fn(); } }

// ── 載入 JSON ─────────────────────────────────
async function loadMaster() {
  const res = await fetch(JSON_BASE + 'story_master.json');
  masterData = await res.json();
}

async function loadStory(storyId) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story) return;
  const file = story.file;
  const res = await fetch(JSON_BASE + file);
  const data = await res.json();
  data.scenes.forEach(s => { db[s.scene_id] = s; });
  currentStoryId = storyId;
}

// 預載下一個小事件
function prefetchNextStory(storyId) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story || !story.next_story) return;
  const next = masterData.stories.find(s => s.story_id === story.next_story);
  if (!next) return;
  fetch(JSON_BASE + next.file).then(r => r.json()).then(data => {
    data.scenes.forEach(s => { db[s.scene_id] = s; });
  }).catch(() => {});
}

// ── 開場 ──────────────────────────────────────
loadMaster().then(async () => {
  await loadStory('1.1');
  splashBtn.textContent = '▶ 開始冒險';
  splashBtn.disabled = false;
  prefetchNextStory('1.1');
}).catch(() => {
  splashBtn.textContent = '載入失敗，請重試';
});

splashBtn.addEventListener('click', () => {
  splashEl.style.display = 'none';
  go('1.1.1');
});

// ── go：載入場景 ──────────────────────────────
function go(id, skipLines = false) {
  // 如果場景不在db，嘗試載入對應小事件
  if (!db[id]) {
    const storyId = id.split('.').slice(0,2).join('.');
    loadingOverlay.classList.add('show');
    loadStory(storyId).then(() => {
      loadingOverlay.classList.remove('show');
      prefetchNextStory(storyId);
      goScene(id, skipLines);
    }).catch(() => {
      loadingOverlay.classList.remove('show');
      showDone();
    });
    return;
  }
  goScene(id, skipLines);
}

function goScene(id, skipLines) {
  const scene = db[id];
  if (!scene) { showDone(); return; }

  mainEl.classList.add('fade');
  setImg(scene.image);

  setTimeout(() => {
    textArea.innerHTML = '';
    optArea.innerHTML = '';
    optArea.style.display = 'none';
    startBtn.style.display = 'none';
    doneEl.style.display = 'none';
    clearTap();
    window.speechSynthesis.cancel();

    setImg(scene.image);
    setProgress(id);
    titleEl.textContent = scene.title || '';
    mainEl.classList.remove('fade');

    const lines = getLines(scene);

    if (skipLines && scene.type === 'free_explore') {
      showFreeExplore(scene);
      return;
    }

    if (id === '1.1.1') {
      startBtn.style.display = 'block';
      startBtn.onclick = () => {
        startBtn.style.display = 'none';
        playLine(scene, lines, 0);
      };
    } else {
      setTimeout(() => playLine(scene, lines, 0), 80);
    }
  }, 280);
}

// ── getLines ──────────────────────────────────
function getLines(scene) {
  if (!scene.visit_count_responses) return scene.lines || [];
  const k = scene.scene_id;
  visits[k] = (visits[k] || 0) + 1;
  const n = visits[k];
  const match = scene.visit_count_responses.find(r => r.visit === n)
              || scene.visit_count_responses[scene.visit_count_responses.length - 1];
  return match.lines;
}

// ── playLine：逐行播放 ────────────────────────
function playLine(scene, lines, idx) {
  if (idx >= lines.length) { afterLines(scene); return; }

  const text = lines[idx];
  const div = document.createElement('div');
  div.className = 'line';
  textArea.appendChild(div);
  setTimeout(() => { div.classList.add('show'); textArea.scrollTop = textArea.scrollHeight; }, 30);

  const next = () => {
    if (idx + 1 < lines.length) {
      setTap(() => playLine(scene, lines, idx + 1));
    } else {
      afterLines(scene);
    }
  };

  if (muted) {
    div.textContent = text;
    setTap(next);
  } else {
    speakHL(div, text, next);
  }
}

// ── afterLines ────────────────────────────────
function afterLines(scene) {
  clearTap();
  if (scene.type === 'free_explore') {
    showFreeExplore(scene);
  } else if (scene.question && scene.choices && scene.choices.length) {
    showOptions(scene);
  } else if (scene.choices && scene.choices.length === 1 && !scene.question) {
    const nextId = scene.choices[0].next_scene;
    // 檢查是否為小事件結尾（next_scene為null或不存在）
    if (!nextId) {
      showNotebook(currentStoryId, () => {
        const story = masterData.stories.find(s => s.story_id === currentStoryId);
        if (story && story.next_story) {
          const nextStoryData = masterData.stories.find(s => s.story_id === story.next_story);
          if (nextStoryData) go(nextStoryData.start_scene);
          else showDone();
        } else {
          showDone();
        }
      });
    } else {
      setTap(() => {
        const nextScene = db[nextId];
        if (nextScene && nextScene.type === 'free_explore') {
          go(nextId, true);
        } else {
          go(nextId);
        }
      });
    }
  } else {
    showDone();
  }
}

// ── showOptions ───────────────────────────────
function showOptions(scene) {
  const valid = scene.choices.filter(o => !o.unlock_condition);

  const qDiv = document.createElement('div');
  qDiv.className = 'line question show';
  textArea.appendChild(qDiv);
  textArea.scrollTop = textArea.scrollHeight;

  optArea.style.display = 'flex';
  valid.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${opt.label||''}</span><span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click', () => pickOpt(opt, btn));
    optArea.appendChild(btn);
  });

  speakHL(qDiv, scene.question, () => speakOpts(valid, 0));
}

function speakOpts(opts, idx) {
  if (idx >= opts.length || muted) return;
  const btn = optArea.querySelectorAll('.opt-btn')[idx];
  if (!btn) { speakOpts(opts, idx+1); return; }
  const textEl = btn.querySelector('.opt-text');
  speakHL(textEl, opts[idx].text, () => speakOpts(opts, idx+1));
}

function pickOpt(opt, btn) {
  window.speechSynthesis.cancel();
  optArea.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  optArea.style.display = 'none';
  clearTap();

  const next = db[opt.next_scene];
  if (next && next.image) setImg(next.image);

  go(opt.next_scene);
}

// ── showFreeExplore（選一個即解鎖）────────────
function showFreeExplore(scene) {
  const k = scene.scene_id;
  if (!explored[k]) explored[k] = new Set();
  const exp = explored[k];

  const qDiv = document.createElement('div');
  qDiv.className = 'line question show';
  textArea.appendChild(qDiv);
  textArea.scrollTop = textArea.scrollHeight;

  renderFEOpts(scene, exp, qDiv);
}

function renderFEOpts(scene, exp, qDiv) {
  optArea.innerHTML = '';
  optArea.style.display = 'flex';

  const visible = [];
  scene.choices.forEach(opt => {
    // 解鎖條件：選了任意一個（exp.size >= 1）即解鎖D選項
    if (opt.unlock_condition) {
      if (exp.size < 1) return; // 未選過任何選項，不顯示
    }
    visible.push(opt);
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${opt.label||''}</span><span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      if (opt.label && opt.label !== 'D') exp.add(opt.label);
      const next = db[opt.next_scene];
      if (next && next.image) setImg(next.image);
      go(opt.next_scene);
    });
    optArea.appendChild(btn);
  });

  speakHL(qDiv, scene.question, () => speakOpts(visible, 0));
}

// ── 學徒筆記 ──────────────────────────────────
function showNotebook(storyId, onContinue) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story) { onContinue && onContinue(); return; }

  // 取notebook資料（從已載入的scenes拿第一個scene的story JSON）
  // notebook資料存在story JSON根層
  const storyScene = db[story.start_scene];
  // 尋找notebook資料：從db中找story_id對應的notebook
  let notebookData = null;
  // 因notebook存在JSON根層，需另外記錄
  notebookData = storyNotebooks[storyId];

  if (!notebookData) { onContinue && onContinue(); return; }

  const left = notebookData.left_page;
  const right = notebookData.right_page;

  // 填左頁
  const storyLinesEl = $('nb-story-lines');
  storyLinesEl.innerHTML = '';
  (left.story_progress || []).forEach(line => {
    const p = document.createElement('div');
    p.className = 'nb-story-line';
    p.textContent = line;
    storyLinesEl.appendChild(p);
  });

  // 地點和人物
  const metaEl = $('nb-meta');
  metaEl.innerHTML = '';
  if (left.places_visited && left.places_visited.length) {
    const row = document.createElement('div');
    row.innerHTML = '去了：' + left.places_visited.map(p => `<span class="nb-tag">${p}</span>`).join('');
    metaEl.appendChild(row);
  }
  if (left.people_met && left.people_met.length) {
    const row = document.createElement('div');
    row.innerHTML = '遇到：' + left.people_met.map(p => `<span class="nb-tag">${p}</span>`).join('');
    metaEl.appendChild(row);
  }

  // 填右頁
  const learnEl = $('nb-learn-items');
  learnEl.innerHTML = '';
  const typeLabel = { vocabulary:'詞彙', character:'字形', value:'品格', reasoning:'推理', social:'社會理解' };
  (right.learned_points || []).forEach(item => {
    const div = document.createElement('div');
    div.className = 'nb-learn-item';
    div.innerHTML = `<div class="nb-learn-type">${typeLabel[item.type] || item.type}</div>
                     <div class="nb-learn-content">${item.content}</div>`;
    learnEl.appendChild(div);
  });

  // 錨點圖像
  const anchorImg = $('nb-anchor-img');
  if (right.anchor_image && IMGS[right.anchor_image]) {
    anchorImg.src = IMG_BASE + IMGS[right.anchor_image];
    anchorImg.style.display = 'block';
  } else {
    anchorImg.style.display = 'none';
  }

  // 顯示筆記
  notebookOverlay.classList.add('show');
  window.speechSynthesis.cancel();

  $('notebook-continue-btn').onclick = () => {
    notebookOverlay.classList.remove('show');
    onContinue && onContinue();
  };
}

// notebook資料存儲（從JSON載入時同步儲存）
const storyNotebooks = {};

// 覆寫loadStory以同步儲存notebook
const _origLoadStory = loadStory;
async function loadStory(storyId) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story) return;
  const res = await fetch(JSON_BASE + story.file);
  const data = await res.json();
  data.scenes.forEach(s => { db[s.scene_id] = s; });
  if (data.notebook) storyNotebooks[storyId] = data.notebook;
  currentStoryId = storyId;
}

// ── 完成畫面 ──────────────────────────────────
function showDone() {
  clearTap();
  doneEl.style.display = 'block';
  tts('阿禾踏出了商行的門。大梁城的街道在等著他們。');
}

// ── 語速 ──────────────────────────────────────
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rate = parseFloat(btn.dataset.rate);
    window.speechSynthesis.cancel();
  });
});

// ── 靜音 ──────────────────────────────────────
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (muted) {
    window.speechSynthesis.cancel();
    if (!tapCb) { setTap(() => fireTap()); }
  }
});
</script>
