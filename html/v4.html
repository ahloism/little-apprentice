<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>小學徒大世界——大梁城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5ede0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Noto Serif TC', 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
      user-select: none;
    }

    /* ── 開場 ── */
    #splash {
      position: fixed; inset: 0;
      background: #c8b08a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; z-index: 100;
    }
    #splash-cover { width: 100%; max-width: 600px; height: auto; border-radius: 12px; }
    #splash-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 18px 60px;
      font-size: 22px; font-family: inherit; cursor: pointer;
      letter-spacing: 3px;
    }
    #splash-btn:active { background: #b87000; transform: scale(0.97); }
    #splash-btn:disabled { background: #a08060; cursor: default; }

    /* ── 繼續/重新開始提示 ── */
    #resume-overlay {
      position: fixed; inset: 0;
      background: #c8b08a;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 100; padding: 20px;
    }
    #resume-overlay.show { display: flex; }
    #resume-cover { width: 100%; max-width: 600px; height: auto; border-radius: 12px; }
    #resume-title { font-size: 24px; color: #fff8ee; letter-spacing: 3px; text-align: center; }
    #resume-subtitle { font-size: 18px; color: #f5ede0; text-align: center; opacity: 0.85; }
    .resume-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 16px 50px;
      font-size: 20px; font-family: inherit; cursor: pointer;
      letter-spacing: 3px; width: 100%; max-width: 320px;
    }
    .resume-btn:active { background: #b87000; transform: scale(0.97); }
    #restart-btn-resume {
      background: transparent; color: #fff8ee;
      border: 2px solid rgba(255,255,255,0.5);
    }
    #restart-btn-resume:active { background: rgba(255,255,255,0.1); }

    /* ── 語速 ── */
    #speed-bar {
      width: 100%; max-width: 600px;
      display: flex; align-items: center; justify-content: flex-end;
      gap: 8px; padding: 8px 100px 0 20px; flex-shrink: 0;
    }
    .speed-label { font-size: 13px; color: #9a7850; }
    .speed-btn {
      background: #fff8ee; border: 1.5px solid #d4a855;
      border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-family: inherit; color: #7a5820; cursor: pointer;
    }
    .speed-btn.active { background: #d4870a; color: #fff8ee; border-color: #d4870a; }

    /* ── 控制按鈕（右上角）── */
    #controls {
      position: fixed; top: 12px; right: 16px;
      display: flex; gap: 8px; z-index: 50;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.7); border: 1px solid #d4a855;
      border-radius: 50%; width: 40px; height: 40px;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn.muted { background: rgba(200,160,80,0.3); }

    /* ── 圖像 ── */
    #image-area {
      width: 100%; max-width: 600px; height: 300px;
      border-radius: 0 0 12px 12px; overflow: hidden;
      flex-shrink: 0; background: #c8b08a;
    }
    #image-area img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
    #img-caption {
      width: 100%; max-width: 600px;
      text-align: center; font-size: 18px; font-style: italic;
      color: #9a7850; padding: 5px 20px 0; flex-shrink: 0;
      min-height: 28px;
    }

    /* ── 並排圖像 ── */
    #display-images {
      display: none; width: 100%; max-width: 600px;
      gap: 8px; padding: 0 20px; flex-shrink: 0;
    }
    #display-images.show { display: flex; }
    #display-images img {
      flex: 1; border-radius: 8px; object-fit: cover;
      height: 120px; border: 2px solid transparent;
      cursor: pointer; transition: border-color 0.2s;
    }
    #display-images img.selected { border-color: #d4870a; }

    /* ── 進度條 ── */
    #progress-wrap { width: 100%; max-width: 600px; padding: 8px 20px 0; flex-shrink: 0; }
    #progress-bg { background: #e0c99a; border-radius: 4px; height: 5px; overflow: hidden; }
    #progress-fill { background: #d4870a; height: 100%; border-radius: 4px; transition: width 0.4s; width: 0%; }

    /* ── 主內容 ── */
    #main {
      width: 100%; max-width: 600px; flex: 1;
      display: flex; flex-direction: column;
      padding: 14px 20px 32px; gap: 14px;
      opacity: 1; transition: opacity 0.3s;
    }
    #main.fade { opacity: 0; }

    /* ── 標題 ── */
    #node-title { color: #7a5820; font-size: 22px; letter-spacing: 2px; text-align: center; line-height: 1.5; min-height: 1.5em; }

    /* ── 文字區 ── */
    #text-area {
      background: #fffaf3; border: 1px solid #e0c99a;
      border-radius: 14px; padding: 20px;
      min-height: 130px; max-height: 320px;
      overflow-y: auto; display: flex; flex-direction: column;
      gap: 10px; cursor: pointer; scroll-behavior: smooth;
    }
    .line {
      color: #3a2a10; font-size: 22px; line-height: 1.9;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.35s, transform 0.35s; flex-shrink: 0;
    }
    .line.show { opacity: 1; transform: translateY(0); }
    .line.question { color: #a07840; margin-top: 6px; }

    /* ── 高亮 ── */
    .hl { display: inline; }
    .hl.on { color: #d4870a; font-weight: bold; }
    .opt-text .hl.on { color: #d4870a; font-weight: bold; }

    /* ── 點擊提示 ── */
    #tap-hint {
      display: none; text-align: center; font-size: 28px;
      color: #d4a855; cursor: pointer; animation: bounce 1.2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── 開始按鈕 ── */
    #start-btn {
      display: none; background: #d4870a; color: #fff8ee;
      border: none; border-radius: 50px; padding: 18px 0; width: 100%;
      font-size: 22px; font-family: inherit; cursor: pointer; letter-spacing: 3px;
    }
    #start-btn:active { background: #b87000; transform: scale(0.97); }

    /* ── 選項 ── */
    #options-area { display: none; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: #fff8ee; border: 2px solid #d4a855;
      border-radius: 12px; padding: 14px 18px;
      font-size: 22px; font-family: inherit; color: #3a2a10;
      text-align: left; cursor: pointer; line-height: 1.6;
      display: flex; align-items: flex-start;
      transition: background 0.15s, border-color 0.15s;
    }
    .opt-btn:active { background: #fdefc8; border-color: #c8900a; transform: scale(0.98); }
    .opt-btn.selected { background: #fdefc8; border-color: #c8900a; }
    .opt-btn:disabled { cursor: default; }
    .opt-label { width: 28px; flex-shrink: 0; color: #a07840; font-weight: bold; }
    .opt-text { flex: 1; }

    /* ── 完成畫面（大事件結束前的佔位）── */
    #done { display: none; text-align: center; color: #a07840; font-size: 20px; line-height: 2; padding: 20px; }

    /* ── 學徒筆記 ── */
    #notebook-overlay {
      position: fixed; inset: 0;
      background: rgba(60, 35, 10, 0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
    }
    #notebook-overlay.show { display: flex; }
    #notebook {
      width: 100%; max-width: 620px;
      background: #fdf6e8; border-radius: 16px;
      border: 2px solid #c8a060;
      box-shadow: 0 8px 32px rgba(80,40,0,0.3);
      overflow: hidden; display: flex; flex-direction: column;
      max-height: 90vh;
    }
    #notebook-header {
      background: #8b5e2a; color: #fff8ee;
      text-align: center; padding: 14px 20px;
      font-size: 20px; letter-spacing: 3px; flex-shrink: 0;
    }
    #notebook-pages { display: flex; flex: 1; overflow: hidden; }
    #notebook-left {
      flex: 1; padding: 20px;
      border-right: 1px dashed #c8a060;
      overflow-y: auto; background: #fffdf5;
    }
    #notebook-right { flex: 1; padding: 20px; overflow-y: auto; background: #fffdf5; }
    .nb-section-title {
      font-size: 15px; color: #8b5e2a; letter-spacing: 2px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid #e0c99a;
    }
    .nb-story-line { font-size: 17px; color: #3a2a10; line-height: 1.9; margin-bottom: 8px; }
    .nb-meta { font-size: 14px; color: #9a7850; margin-top: 12px; line-height: 2; }
    .nb-tag {
      display: inline-block; background: #f0e0c0;
      border-radius: 20px; padding: 2px 10px;
      font-size: 13px; color: #7a5820; margin: 2px;
    }
    .nb-learn-item {
      margin-bottom: 14px; padding: 10px 12px;
      background: #fff8ee; border-radius: 10px;
      border: 1px solid #e0c99a;
    }
    .nb-learn-type { font-size: 12px; color: #a07840; letter-spacing: 1px; margin-bottom: 4px; }
    .nb-learn-content { font-size: 17px; color: #3a2a10; line-height: 1.7; }
    .nb-anchor-img { width: 100%; border-radius: 10px; margin-top: 12px; object-fit: cover; max-height: 120px; }
    #notebook-footer {
      background: #f5ede0; padding: 14px 20px;
      text-align: center; flex-shrink: 0;
      border-top: 1px solid #e0c99a;
    }
    #notebook-continue-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 14px 50px;
      font-size: 20px; font-family: inherit; cursor: pointer; letter-spacing: 3px;
    }
    #notebook-continue-btn:active { background: #b87000; transform: scale(0.97); }

    /* ── 載入過渡 ── */
    #loading-overlay {
      position: fixed; inset: 0; background: #c8b08a;
      display: none; align-items: center; justify-content: center;
      z-index: 150; font-size: 22px; color: #fff8ee; letter-spacing: 2px;
    }
    #loading-overlay.show { display: flex; }

    /* ── 開發者面板 ── */
    #dev-panel {
      display: none; position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border-radius: 12px;
      padding: 12px 16px; z-index: 300;
      flex-direction: column; gap: 8px; align-items: center;
    }
    #dev-panel.show { display: flex; }
    #dev-input {
      font-size: 18px; padding: 8px 12px; border-radius: 8px;
      border: none; font-family: monospace; width: 160px; text-align: center;
    }
    #dev-go {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 8px; padding: 8px 20px;
      font-size: 16px; cursor: pointer; font-family: inherit;
    }
    #dev-clear {
      background: #c0392b; color: #fff; border: none;
      border-radius: 8px; padding: 8px 20px;
      font-size: 16px; cursor: pointer; font-family: inherit;
    }

    /* ── 完結報告畫面 ── */
    #report-screen {
      display: none; position: fixed; inset: 0;
      background: #f5ede0; overflow-y: auto;
      z-index: 400; padding: 0 0 60px 0;
    }
    #report-screen.show { display: block; }
    #report-header {
      background: #8b5e2a; color: #fff8ee;
      text-align: center; padding: 20px;
      font-size: 22px; letter-spacing: 3px;
    }
    #report-subtitle {
      text-align: center; color: #9a7850;
      font-size: 16px; padding: 12px 20px 0;
      letter-spacing: 1px;
    }
    .report-section {
      width: 100%; max-width: 600px;
      margin: 0 auto; padding: 16px 20px;
    }
    .report-section-title {
      font-size: 16px; color: #8b5e2a; letter-spacing: 2px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #e0c99a;
    }
    .dim-row {
      background: #fffaf3; border: 1px solid #e0c99a;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    }
    .dim-name { font-size: 16px; color: #7a5820; margin-bottom: 8px; letter-spacing: 1px; }
    .dim-stars { font-size: 22px; margin-bottom: 6px; }
    .dim-desc { font-size: 16px; color: #3a2a10; line-height: 1.7; }
    #qualitative-section {
      background: #fffaf3; border: 1px solid #e0c99a;
      border-radius: 12px; padding: 16px;
      font-size: 17px; color: #3a2a10; line-height: 1.9;
      min-height: 80px;
    }
    #qualitative-loading {
      text-align: center; color: #9a7850;
      font-size: 16px; padding: 20px;
    }
    .report-btns {
      width: 100%; max-width: 600px;
      margin: 0 auto; padding: 8px 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .report-action-btn {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 16px 0; width: 100%;
      font-size: 20px; font-family: inherit; cursor: pointer; letter-spacing: 3px;
    }
    .report-action-btn:active { background: #b87000; transform: scale(0.97); }
    .report-action-btn.secondary {
      background: transparent; color: #8b5e2a;
      border: 2px solid #c8a060; font-size: 18px;
    }
    .report-action-btn.secondary:active { background: #f0e0c0; }

    /* 大事件完結前佔位 */
    #event-end-screen {
      display: none; position: fixed; inset: 0;
      background: #c8b08a;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 24px; z-index: 400; padding: 20px;
    }
    #event-end-screen.show { display: flex; }
    #event-end-title { font-size: 28px; color: #fff8ee; letter-spacing: 4px; text-align: center; }
    #event-end-subtitle { font-size: 18px; color: #f5ede0; text-align: center; opacity: 0.85; line-height: 1.8; }
    #event-end-restart {
      background: #d4870a; color: #fff8ee; border: none;
      border-radius: 50px; padding: 16px 50px;
      font-size: 20px; font-family: inherit; cursor: pointer; letter-spacing: 3px;
    }
  </style>
</head>
<body>

<!-- 開場 -->
<div id="splash">
  <img id="splash-cover" src="https://raw.githubusercontent.com/ahloism/little-apprentice/main/image/A02_%E5%B0%81%E9%9D%A2.png" alt="小學徒大世界" />
  <button id="splash-btn" disabled>載入中…</button>
</div>

<!-- 繼續/重新開始 -->
<div id="resume-overlay">
  <img id="resume-cover" src="https://raw.githubusercontent.com/ahloism/little-apprentice/main/image/A02_%E5%B0%81%E9%9D%A2.png" alt="小學徒大世界" />
  <div id="resume-title">小學徒大世界</div>
  <div id="resume-subtitle">上次玩到一半，要繼續嗎？</div>
  <button class="resume-btn" id="continue-btn">▶ 繼續冒險</button>
  <button class="resume-btn" id="restart-btn-resume">重新開始</button>
</div>

<!-- 控制按鈕 -->
<div id="controls">
  <button class="ctrl-btn" id="music-btn" title="音樂">🎵</button>
  <button class="ctrl-btn" id="voice-btn" title="語音">🔊</button>
</div>

<!-- 語速 -->
<div id="speed-bar">
  <span class="speed-label">語速</span>
  <button class="speed-btn" data-rate="0.7">慢</button>
  <button class="speed-btn active" data-rate="0.88">正常</button>
  <button class="speed-btn" data-rate="1.1">快</button>
</div>

<!-- 圖像 -->
<div id="image-area"><img id="img-el" src="" alt="" /></div>
<div id="display-images"></div>
<div id="img-caption"></div>
<div id="progress-wrap"><div id="progress-bg"><div id="progress-fill"></div></div></div>

<!-- 主內容 -->
<div id="main">
  <div id="node-title"></div>
  <div id="text-area"></div>
  <div id="options-area"></div>
  <button id="start-btn">▶ 開始</button>
  <div id="tap-hint">👆</div>
  <div id="done"></div>
</div>

<!-- 學徒筆記 -->
<div id="notebook-overlay">
  <div id="notebook">
    <div id="notebook-header">學徒筆記</div>
    <div id="notebook-pages">
      <div id="notebook-left">
        <div class="nb-section-title">今天發生了⋯⋯</div>
        <div id="nb-story-lines"></div>
        <div id="nb-meta" class="nb-meta"></div>
      </div>
      <div id="notebook-right">
        <div class="nb-section-title">今次學了</div>
        <div id="nb-learn-items"></div>
        <img id="nb-anchor-img" class="nb-anchor-img" src="" alt="" style="display:none" />
      </div>
    </div>
    <div id="notebook-footer">
      <button id="notebook-continue-btn">繼續</button>
    </div>
  </div>
</div>

<!-- 載入提示 -->
<div id="loading-overlay">載入中⋯⋯</div>

<!-- 開發者面板 -->
<div id="dev-panel">
  <input id="dev-input" placeholder="輸入 scene_id" />
  <button id="dev-go">跳去</button>
  <button id="dev-clear">清除存檔</button>
</div>

<!-- 完結報告畫面 -->
<div id="report-screen">
  <div id="report-header">大事件一完成！</div>
  <div id="report-subtitle">阿禾的學習報告</div>
  <div class="report-section">
    <div class="report-section-title">能力表現</div>
    <div id="quantitative-report"></div>
  </div>
  <div class="report-section">
    <div class="report-section-title">學習觀察</div>
    <div id="qualitative-section">
      <div id="qualitative-loading">生成中⋯⋯</div>
    </div>
  </div>
  <div class="report-btns">
    <button class="report-action-btn" id="download-report-btn">📄 下載報告</button>
    <button class="report-action-btn secondary" id="restart-from-report-btn">重新開始</button>
  </div>
</div>

<!-- 大事件完結畫面 -->
<div id="event-end-screen">
  <div id="event-end-title">大事件二</div>
  <div id="event-end-subtitle">即將來臨</div>
  <button id="event-end-restart">重新開始大事件一</button>
</div>

// 設定

let bgmAudio = null;
let currentBgm = null;
let musicMuted = false;
let voiceMuted = false;

function playBgm(key, volume = 0.5) {
  if (musicMuted) return;
  if (currentBgm === key && bgmAudio && !bgmAudio.paused) {
    bgmAudio.volume = volume; return;
  }
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.src = ''; }
  currentBgm = key;
  bgmAudio = new Audio(AUDIO_BASE + key + '.mp3');
  bgmAudio.loop = true;
  bgmAudio.volume = volume;
  bgmAudio.play().catch(() => {});
}

function stopBgm() {
  if (bgmAudio) bgmAudio.pause();
}

function playBgmForScene(scene) {
  if (musicMuted) return;
  const storyId = scene.scene_id.split('.').slice(0,2).join('.');
  if (KEY_ASSESSMENT_SCENES.has(scene.scene_id)) { playBgm('BGM_02', 0.4); return; }
  const bgmKey = SCENE_BGM[storyId] || 'BGM_01';
  const vol = BGM_VOLUME[scene.type] || 0.5;
  playBgm(bgmKey, vol);
}

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('la_progress')) || null; } catch { return null; }
}
function saveProgress(data) {
  try { localStorage.setItem('la_progress', JSON.stringify(data)); } catch {}
}
function loadAssessment() {
  try { return JSON.parse(localStorage.getItem('la_assessment')) || null; } catch { return null; }
}
function saveAssessment(data) {
  try { localStorage.setItem('la_assessment', JSON.stringify(data)); } catch {}
}
function clearStorage() {
  localStorage.removeItem('la_progress');
  localStorage.removeItem('la_assessment');
}

// 初始化評估數據
function initAssessment() {
  const existing = loadAssessment();
  if (existing) return existing;
  const data = {
    session_id: Math.random().toString(36).slice(2,10),
    nodes: []
  };
  saveAssessment(data);
  return data;
}

// 收集評估數據
function collectData(scene, label) {
  if (!scene.collect) return;
  const c = scene.collect;
  const data = loadAssessment() || initAssessment();

  if (c.type === 'assessment') {
    const supportOpts = Array.isArray(c.support_option) ? c.support_option : (c.support_option ? [c.support_option] : []);
    data.nodes.push({
      scene_id: scene.scene_id,
      type: 'assessment',
      dimension: c.dimension,
      label: label,
      support_flag: supportOpts.includes(label),
    });
  } else if (c.type === 'exploration') {
    // 只記錄首次
    const already = data.nodes.find(n => n.scene_id === scene.scene_id && n.type === 'exploration');
    if (!already) {
      data.nodes.push({
        scene_id: scene.scene_id,
        type: 'exploration',
        exp_tag: c.exp_tag,
        label: label,
      });
    }
  } else if (c.type === 'hidden_assessment') {
    data.nodes.push({
      scene_id: scene.scene_id,
      type: 'hidden_assessment',
      trigger: c.trigger,
      exp_tag: c.exp_tag,
      label: label,
    });
  }
  saveAssessment(data);
}

// 收集隱藏補救節點（進入即記錄）
function collectHiddenRemedial(scene) {
  if (!scene.collect || scene.collect.type !== 'hidden_remedial') return;
  const data = loadAssessment() || initAssessment();
  const already = data.nodes.find(n => n.scene_id === scene.scene_id);
  if (!already) {
    data.nodes.push({
      scene_id: scene.scene_id,
      type: 'hidden_remedial',
      trigger: scene.collect.trigger,
    });
    saveAssessment(data);
  }
}

// 計算各維度分數
function calcScores() {
  const data = loadAssessment();
  if (!data) return {};

  const scores = {};
  const maxes = {};
  const dims = ['vocabulary','situation_understanding','social_understanding','information_integration','value_judgment'];
  dims.forEach(d => { scores[d] = 0; maxes[d] = 0; });

  data.nodes.filter(n => n.type === 'assessment').forEach(n => {
    // 判斷正確程度：需要從JSON場景取得，這裡用support_flag反推
    // support_flag=true 表示錯誤或部分正確（需支援）
    // 這裡我們需要更精確的分數，但目前collect只有support_flag
    // 用label和support_option的關係推算：非support的選項=正確
    // 但我們沒有存分數，需要補救方案
    // 暫時方案：support_flag=false → 1分，support_flag=true → 0分
    // 日後可在collect加score欄位優化
    const dims = n.dimension || [];
    dims.forEach((dim, i) => {
      if (!scores[dim] && scores[dim] !== 0) return;
      const weight = i === 0 ? 1 : 0.5;
      const score = n.support_flag ? 0 : 1;
      scores[dim] = (scores[dim] || 0) + score * weight;
      maxes[dim] = (maxes[dim] || 0) + weight;
    });
  });

  const result = {};
  dims.forEach(d => {
    if (maxes[d] > 0) {
      result[d] = scores[d] / maxes[d];
    }
  });
  return result;
}

window.speechSynthesis.onvoiceschanged = findVoice;
findVoice();
function findVoice() {
  const vs = window.speechSynthesis.getVoices();
  ttsVoice = vs.find(v => v.lang.toLowerCase().includes('zh-hk') || v.name.toLowerCase().includes('cantonese'))
          || vs.find(v => v.lang.toLowerCase().startsWith('zh'))
          || null;
}

function tts(text, cb) {
  window.speechSynthesis.cancel();
  if (voiceMuted || !text) { cb && setTimeout(cb, 0); return; }
  const u = new SpeechSynthesisUtterance(text);
  if (ttsVoice) { u.voice = ttsVoice; u.lang = ttsVoice.lang; } else u.lang = 'zh-HK';
  u.rate = rate;
  let called = false;
  const done = () => { if (!called) { called = true; cb && cb(); } };
  u.onend = done;
  u.onerror = done;
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════
// 高亮語音同步（修正版）
// ════════════════════════════════════════════════
let hlN = 0;
function speakHL(el, text, cb) {
  const key = 'h' + (hlN++);
  const chars = [...text]; // 正確處理中文字符
  el.innerHTML = chars.map((c, i) => `<span class="hl" id="${key}_${i}">${c}</span>`).join('');

  if (voiceMuted) { cb && setTimeout(cb, 0); return; }

  // 使用Web Speech API的boundary事件做精確同步
  const u = new SpeechSynthesisUtterance(text);
  if (ttsVoice) { u.voice = ttsVoice; u.lang = ttsVoice.lang; } else u.lang = 'zh-HK';
  u.rate = rate;

  // 估算每字時長作為fallback
  const totalMs = (text.length / rate) * 220;
  const perMs = totalMs / chars.length;
  let i = 0;
  let hlInterval = null;

  function startHL() {
    hlInterval = setInterval(() => {
      if (i > 0) {
        const prev = document.getElementById(`${key}_${i-1}`);
        if (prev) prev.classList.remove('on');
      }
      if (i >= chars.length) { clearInterval(hlInterval); return; }
      const cur = document.getElementById(`${key}_${i}`);
      if (cur) cur.classList.add('on');
      i++;
    }, perMs);
  }

  let called = false;
  const done = () => {
    if (!called) {
      called = true;
      clearInterval(hlInterval);
      chars.forEach((_, j) => {
        const e = document.getElementById(`${key}_${j}`);
        if (e) e.classList.remove('on');
      });
      cb && cb();
    }
  };

  u.onstart = () => startHL();
  u.onend = done;
  u.onerror = done;
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════════════
function setProgress(id) {
  const ms = Object.values(db).filter(s => {
    const parts = s.scene_id.split('.');
    return parts.length === 3 && !s.scene_id.match(/\.[A-Z]$/);
  });
  const idx = ms.findIndex(s => s.scene_id === id);
  progressFill.style.width = ms.length ? `${((idx+1)/ms.length)*100}%` : '0%';
}

// ════════════════════════════════════════════════
// 點擊提示
// ════════════════════════════════════════════════
function setTap(fn) {
  tapCb = fn;
  clearTimeout(tapTimer);
  tapHint.style.display = 'none';
  tapTimer = setTimeout(() => { tapHint.style.display = 'block'; }, 2000);
}
function clearTap() {
  tapCb = null;
  clearTimeout(tapTimer);
  tapHint.style.display = 'none';
}
textArea.addEventListener('click', fireTap);
tapHint.addEventListener('click', fireTap);
mainEl.addEventListener('click', e => { if (e.target === mainEl) fireTap(); });
function fireTap() { if (tapCb) { const fn = tapCb; clearTap(); fn(); } }

// ════════════════════════════════════════════════
// 語速
// ════════════════════════════════════════════════
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rate = parseFloat(btn.dataset.rate);
    window.speechSynthesis.cancel();
  });
});

// ════════════════════════════════════════════════
// JSON 載入
// ════════════════════════════════════════════════
async function loadMaster() {
  const res = await fetch(JSON_BASE + 'story_master.json');
  masterData = await res.json();
}

async function loadStory(storyId) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story) return;
  const res = await fetch(JSON_BASE + story.file);
  const data = await res.json();
  data.scenes.forEach(s => { db[s.scene_id] = s; });
  if (data.notebook) storyNotebooks[storyId] = data.notebook;
  currentStoryId = storyId;
}

function prefetchNextStory(storyId) {
  const story = masterData.stories.find(s => s.story_id === storyId);
  if (!story || !story.next_story) return;
  const next = masterData.stories.find(s => s.story_id === story.next_story);
  if (!next) return;
  fetch(JSON_BASE + next.file).then(r => r.json()).then(data => {
    data.scenes.forEach(s => { db[s.scene_id] = s; });
    if (data.notebook) storyNotebooks[story.next_story] = data.notebook;
  }).catch(() => {});
}

// ════════════════════════════════════════════════
// 開場邏輯（含 reload 判斷）
// ════════════════════════════════════════════════
loadMaster().then(async () => {
  await loadStory('1.1');
  prefetchNextStory('1.1');

  const prog = loadProgress();

  // 大事件一已完成
  if (prog && prog.completed_events && prog.completed_events.includes('1.7')) {
    splashEl.style.display = 'none';
    showEventEndScreen();
    return;
  }

  // 有進度可繼續
  if (prog && prog.current_node) {
    splashEl.style.display = 'none';
    resumeOverlay.classList.add('show');

    $('continue-btn').onclick = async () => {
      resumeOverlay.classList.remove('show');
      // 載入對應小事件
      const storyId = prog.current_node.split('.').slice(0,2).join('.');
      const startOfEvent = masterData.stories.find(s => s.story_id === storyId);
      if (!db[prog.current_node] && startOfEvent) {
        loadingOverlay.classList.add('show');
        await loadStory(storyId).catch(() => {});
        loadingOverlay.classList.remove('show');
      }
      // 從小事件開頭開始（不從節點中途）
      const startScene = startOfEvent ? startOfEvent.start_scene : prog.current_node;
      go(startScene);
    };

    $('restart-btn-resume').onclick = () => {
      clearStorage();
      initAssessment();
      resumeOverlay.classList.remove('show');
      go('1.1.1');
    };
    return;
  }

  // 全新開始
  splashBtn.textContent = '▶ 開始冒險';
  splashBtn.disabled = false;
  initAssessment();

}).catch(() => {
  splashBtn.textContent = '載入失敗，請重試';
  splashBtn.disabled = false;
});

splashBtn.addEventListener('click', () => {
  splashEl.style.display = 'none';
  go('1.1.1');
});

// ════════════════════════════════════════════════
// go：載入場景
// ════════════════════════════════════════════════
function go(id, skipLines = false) {
  if (!db[id]) {
    const storyId = id.split('.').slice(0,2).join('.');
    loadingOverlay.classList.add('show');
    loadStory(storyId).then(() => {
      loadingOverlay.classList.remove('show');
      prefetchNextStory(storyId);
      goScene(id, skipLines);
    }).catch(() => {
      loadingOverlay.classList.remove('show');
      showDone();
    });
    return;
  }
  goScene(id, skipLines);
}

function goScene(id, skipLines) {
  const scene = db[id];
  if (!scene) { showDone(); return; }

  // 更新進度存檔
  updateProgress(id);

  // 補救型隱藏節點進入即記錄
  if (scene.collect && scene.collect.type === 'hidden_remedial') {
    collectHiddenRemedial(scene);
  }

  mainEl.classList.add('fade');

  const isAssessment = scene.type === 'assessment';
  setImgWithCaption(scene.image, isAssessment);

  setTimeout(() => {
    textArea.innerHTML = '';
    optArea.innerHTML = '';
    optArea.style.display = 'none';
    startBtn.style.display = 'none';
    doneEl.style.display = 'none';
    displayImagesEl.innerHTML = '';
    displayImagesEl.classList.remove('show');
    clearTap();
    window.speechSynthesis.cancel();

    setImgWithCaption(scene.image, isAssessment);
    setProgress(id);
    titleEl.textContent = scene.title || '';
    titleEl.dataset.sceneId = id;
    mainEl.classList.remove('fade');

    playBgmForScene(scene);

    const lines = getLines(scene);

    if (skipLines && scene.type === 'free_explore') {
      showFreeExplore(scene);
      return;
    }

    if (id === '1.1.1') {
      startBtn.style.display = 'block';
      startBtn.onclick = () => {
        startBtn.style.display = 'none';
        playLine(scene, lines, 0);
      };
    } else {
      setTimeout(() => playLine(scene, lines, 0), 80);
    }
  }, 280);
}

// ════════════════════════════════════════════════
// getLines
// ════════════════════════════════════════════════
function getLines(scene) {
  if (!scene.visit_count_responses) return scene.lines || [];
  const k = scene.scene_id;
  visits[k] = (visits[k] || 0) + 1;
  const n = visits[k];
  const match = scene.visit_count_responses.find(r => r.visit === n)
              || scene.visit_count_responses[scene.visit_count_responses.length - 1];
  return match.lines;
}

// ════════════════════════════════════════════════
// playLine
// ════════════════════════════════════════════════
function playLine(scene, lines, idx) {
  if (idx >= lines.length) { afterLines(scene); return; }

  if (scene.image_cues) {
    const cue = scene.image_cues.find(c => c.trigger_line_index === idx);
    if (cue && cue.image) setImgWithCaption(cue.image, scene.type === 'assessment');
  }

  const text = lines[idx];
  const div = document.createElement('div');
  div.className = 'line';
  textArea.appendChild(div);
  setTimeout(() => { div.classList.add('show'); textArea.scrollTop = textArea.scrollHeight; }, 30);

  const next = () => {
    if (idx + 1 < lines.length) {
      setTap(() => playLine(scene, lines, idx + 1));
    } else {
      afterLines(scene);
    }
  };

  if (voiceMuted) {
    div.textContent = text;
    setTap(next);
  } else {
    speakHL(div, text, next);
  }
}

// ════════════════════════════════════════════════
// afterLines
// ════════════════════════════════════════════════
function afterLines(scene) {
  clearTap();

  // 小事件結尾
  if ('next_story' in scene) {
    markEventComplete(currentStoryId);
    const doTransition = () => {
      if (scene.next_story && scene.next_story !== 'null') {
        const nextStoryData = masterData.stories.find(s => s.story_id === scene.next_story);
        if (nextStoryData) go(nextStoryData.start_scene);
        else showDone();
      } else {
        // 大事件一結束
        showReport();
      }
    };
    const notebookStoryId = scene.scene_id.split('.').slice(0,2).join('.');
    setTap(() => showNotebook(notebookStoryId, doTransition));
    return;
  }

  if (scene.type === 'free_explore') {
    showFreeExplore(scene);
  } else if (scene.question && scene.choices && scene.choices.length) {
    showOptions(scene);
  } else if (scene.choices && scene.choices.length === 1 && !scene.question) {
    const nextId = scene.choices[0].next_scene;
    setTap(() => {
      const nextScene = db[nextId];
      if (nextScene && nextScene.type === 'free_explore') go(nextId, true);
      else go(nextId);
    });
  } else {
    showDone();
  }
}

// ════════════════════════════════════════════════
// showOptions
// ════════════════════════════════════════════════
function showOptions(scene) {
  const valid = scene.choices.filter(o => !o.unlock_condition);

  if (scene.display_images && scene.display_images.length) {
    displayImagesEl.innerHTML = '';
    scene.display_images.forEach((code, i) => {
      const img = document.createElement('img');
      img.src = IMG_BASE + (IMGS[code] || '');
      img.alt = NAMES[code] || code;
      img.addEventListener('click', () => {
        displayImagesEl.querySelectorAll('img').forEach(im => im.classList.remove('selected'));
        img.classList.add('selected');
        const opt = valid[i];
        if (opt) {
          const btn = optArea.querySelectorAll('.opt-btn')[i];
          if (btn) pickOpt(scene, opt, btn);
        }
      });
      displayImagesEl.appendChild(img);
    });
    displayImagesEl.classList.add('show');
  }

  const qDiv = document.createElement('div');
  qDiv.className = 'line question show';
  textArea.appendChild(qDiv);
  textArea.scrollTop = textArea.scrollHeight;

  optArea.style.display = 'flex';
  valid.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${opt.label||''}</span><span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click', () => pickOpt(scene, opt, btn));
    optArea.appendChild(btn);
  });

  playSfx('SFX_01');
  speakHL(qDiv, scene.question, () => speakOpts(valid, 0));
}

function speakOpts(opts, idx) {
  if (idx >= opts.length || voiceMuted) return;
  const btn = optArea.querySelectorAll('.opt-btn')[idx];
  if (!btn) { speakOpts(opts, idx+1); return; }
  const textEl = btn.querySelector('.opt-text');
  speakHL(textEl, opts[idx].text, () => speakOpts(opts, idx+1));
}

function pickOpt(scene, opt, btn) {
  window.speechSynthesis.cancel();
  optArea.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  optArea.style.display = 'none';
  displayImagesEl.classList.remove('show');
  clearTap();

  // 收集評估數據
  collectData(scene, opt.label);

  // 音效
  const nextScene = db[opt.next_scene];
  if (nextScene && nextScene.type === 'feedback') {
    // 判斷是否正確：若scene有collect，用support_flag判斷
    if (scene.collect && scene.collect.type === 'assessment') {
      const supportOpts = Array.isArray(scene.collect.support_option)
        ? scene.collect.support_option
        : (scene.collect.support_option ? [scene.collect.support_option] : []);
      playSfx(supportOpts.includes(opt.label) ? 'SFX_03' : 'SFX_02');
    }
  }

  if (nextScene && nextScene.image) setImgWithCaption(nextScene.image, false);
  go(opt.next_scene);
}

// ════════════════════════════════════════════════
// showFreeExplore
// ════════════════════════════════════════════════
function showFreeExplore(scene) {
  const k = scene.scene_id;
  if (!explored[k]) explored[k] = new Set();
  const exp = explored[k];

  const qDiv = document.createElement('div');
  qDiv.className = 'line question show';
  textArea.appendChild(qDiv);
  textArea.scrollTop = textArea.scrollHeight;

  renderFEOpts(scene, exp, qDiv);
}

function renderFEOpts(scene, exp, qDiv) {
  optArea.innerHTML = '';
  optArea.style.display = 'flex';

  const visible = [];
  scene.choices.forEach(opt => {
    if (opt.unlock_condition && exp.size < 1) return;
    visible.push(opt);
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${opt.label||''}</span><span class="opt-text">${opt.text}</span>`;
    btn.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      if (opt.label && opt.label !== 'D') {
        exp.add(opt.label);
        // 收集探索數據（首次）
        collectData(scene, opt.label);
      }
      const next = db[opt.next_scene];
      if (next && next.image) setImgWithCaption(next.image, false);
      go(opt.next_scene);
    });
    optArea.appendChild(btn);
  });

  playSfx('SFX_01');
  speakHL(qDiv, scene.question, () => speakOpts(visible, 0));
}

// ════════════════════════════════════════════════
// 學徒筆記
// ════════════════════════════════════════════════
function showNotebook(storyId, onContinue) {
  if (!storyNotebooks[storyId]) {
    loadStory(storyId).then(() => {
      if (storyNotebooks[storyId]) _renderNotebook(storyId, onContinue);
      else onContinue && onContinue();
    }).catch(() => { onContinue && onContinue(); });
    return;
  }
  _renderNotebook(storyId, onContinue);
}

function _renderNotebook(storyId, onContinue) {
  const notebookData = storyNotebooks[storyId];
  if (!notebookData) { onContinue && onContinue(); return; }

  const left = notebookData.left_page;
  const right = notebookData.right_page;

  // 左頁
  const storyLinesEl = $('nb-story-lines');
  storyLinesEl.innerHTML = '';
  (left.story_progress || []).forEach(line => {
    const p = document.createElement('div');
    p.className = 'nb-story-line';
    p.textContent = line;
    storyLinesEl.appendChild(p);
  });

  const metaEl = $('nb-meta');
  metaEl.innerHTML = '';
  if (left.places_visited && left.places_visited.length) {
    const row = document.createElement('div');
    row.innerHTML = '去了：' + left.places_visited.map(p => `<span class="nb-tag">${p}</span>`).join('');
    metaEl.appendChild(row);
  }
  if (left.people_met && left.people_met.length) {
    const row = document.createElement('div');
    row.innerHTML = '遇到：' + left.people_met.map(p => `<span class="nb-tag">${p}</span>`).join('');
    metaEl.appendChild(row);
  }

  // 右頁
  const learnEl = $('nb-learn-items');
  learnEl.innerHTML = '';
  (right.learned_points || []).forEach(item => {
    const div = document.createElement('div');
    div.className = 'nb-learn-item';
    div.innerHTML = `<div class="nb-learn-type">${TYPE_LABEL[item.type] || item.type}</div>
                     <div class="nb-learn-content">${item.content}</div>`;
    learnEl.appendChild(div);
  });

  // 錨點圖像
  const anchorImg = $('nb-anchor-img');
  if (right.anchor_image && IMGS[right.anchor_image]) {
    anchorImg.src = IMG_BASE + IMGS[right.anchor_image];
    anchorImg.style.display = 'block';
  } else {
    anchorImg.style.display = 'none';
  }

  notebookOverlay.classList.add('show');
  window.speechSynthesis.cancel();
  stopBgm();
  playNotebookBgm();

  $('notebook-continue-btn').onclick = () => {
    stopBgm();
    notebookOverlay.classList.remove('show');
    onContinue && onContinue();
  };
}

// ════════════════════════════════════════════════
// 完成畫面（佔位，大事件完成後才顯示報告）
// ════════════════════════════════════════════════
function showDone() {
  clearTap();
  stopBgm();
  doneEl.style.display = 'block';
  doneEl.textContent = '阿禾踏出了商行的門。大梁城的街道在等著他們。';
  tts('阿禾踏出了商行的門。大梁城的街道在等著他們。');
}

// ════════════════════════════════════════════════
// 完結報告
// ════════════════════════════════════════════════
function showReport() {
  stopBgm();
  window.speechSynthesis.cancel();

  // 標記大事件一完成
  const prog = loadProgress() || { current_node: null, completed_events: [], notebook_entries: [] };
  if (!prog.completed_events.includes('1.7')) prog.completed_events.push('1.7');
  saveProgress(prog);

  // 計算量化分數
  const scores = calcScores();
  const dims = ['vocabulary','situation_understanding','social_understanding','information_integration','value_judgment'];

  const quantEl = $('quantitative-report');
  quantEl.innerHTML = '';

  dims.forEach(dim => {
    const pct = scores[dim] !== undefined ? scores[dim] : 0.5;
    const stars = getStars(pct);
    const level = getLevel(pct);
    const sentence = REPORT_SENTENCES[dim][level];
    const starStr = '★'.repeat(stars) + '☆'.repeat(5 - stars);

    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `<div class="dim-name">${DIM_NAMES[dim]}</div>
                     <div class="dim-stars">${starStr}</div>
                     <div class="dim-desc">${sentence}</div>`;
    quantEl.appendChild(row);
  });

  reportScreen.classList.add('show');

  // 生成質性報告
  generateQualitativeReport(scores);

  // 下載按鈕
  $('download-report-btn').onclick = () => {
    window.print();
  };

  // 重新開始
  $('restart-from-report-btn').onclick = () => {
    clearStorage();
    initAssessment();
    reportScreen.classList.remove('show');
    location.reload();
  };
}

async function generateQualitativeReport(scores) {
  const qualEl = $('qualitative-section');
  const loadingEl = $('qualitative-loading');

  // 整理傳入數據
  const data = loadAssessment();
  if (!data) { loadingEl.textContent = '暫無探索數據。'; return; }

  const dims = ['vocabulary','situation_understanding','social_understanding','information_integration','value_judgment'];
  const levelNames = ['第一級','第二級','第三級','第四級'];

  const abilityLines = dims.map(d => {
    const pct = scores[d] !== undefined ? scores[d] : 0.5;
    return `${DIM_NAMES[d]}：${levelNames[getLevel(pct)]}`;
  }).join('\n');

  const worldExp = data.nodes.filter(n => n.exp_tag === 'EXP_world').map(n => n.label).join('、');
  const infoExp = data.nodes.filter(n => n.exp_tag === 'EXP_info').map(n => n.label).join('、');
  const hidden = data.nodes.filter(n => n.type === 'hidden_remedial' || n.type === 'hidden_assessment')
    .map(n => n.trigger).join('；');

  const prompt = `能力表現：
${abilityLines}

探索行為：
環境探索：${worldExp || '無記錄'}
信息探索：${infoExp || '無記錄'}
${hidden ? `隱藏節點：${hidden}` : ''}`;

  try {
    const res = await fetch(WORKERS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });
    const json = await res.json();
    const text = json.text || json.response || '';
    if (text) {
      qualEl.innerHTML = '';
      text.split('\n').filter(l => l.trim()).forEach(line => {
        const p = document.createElement('p');
        p.style.marginBottom = '12px';
        p.textContent = line;
        qualEl.appendChild(p);
      });
    } else {
      loadingEl.textContent = '報告生成失敗，請截圖量化部分作記錄。';
    }
  } catch {
    loadingEl.textContent = '無法連接報告服務，請截圖量化部分作記錄。';
  }
}

// ════════════════════════════════════════════════
// 大事件完結畫面
// ════════════════════════════════════════════════
function showEventEndScreen() {
  eventEndScreen.classList.add('show');
  $('event-end-restart').onclick = () => {
    clearStorage();
    initAssessment();
    eventEndScreen.classList.remove('show');
    location.reload();
  };
}
